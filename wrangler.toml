name = "cf-edgenix"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────────────────────
# Workers Cache（Worker の手前に置かれるレスポンスキャッシュ）
#   - GET/HEAD の応答を Cache-Control に従って edge にキャッシュ
#     （tiered cache + request collapsing 内蔵）
#   - ヒット時は Worker 自体が起動しない（KV / R2 に一切到達しない）
#   - /api/* は no-store を返すため対象外（src/api/app.ts）
#   - killed 時の quota 503 も no-store（src/quota/guard.ts）
#   - 無効化は Cache-Tag ベースの purge（GC / publish finalize）
# ─────────────────────────────────────────────────────────────
[cache]
enabled = true

# ─────────────────────────────────────────────────────────────
# Static landing site (SvelteKit + adapter-static, web/build)
#   - /, /favicon.svg, /_app/* 等のアセット一致時はそのまま配信
#   - /nix-cache-info, /<hash>.narinfo, /nar/*, /api/* はアセット未マッチで
#     Worker (src/index.ts) にフォールバック
#   - [build] でデプロイ前に web 側の build を走らせる（Workers Builds 対応）
# ─────────────────────────────────────────────────────────────

[assets]
binding = "ASSETS"
directory = "./web/build"

[build]
command = "bun run build:web"

# ─────────────────────────────────────────────────────────────
# Bindings
#   R2  : NAR / narinfo の正本（source of truth / read path の終点）
#   KV  : narinfo / nix-cache-info の速度層（結果整合・正本ではない）
#   D1  : control plane（build履歴 / latest / rollback root / GC live set）
# spec docs/spec.md §4, §6, §7 を参照。
# 実 ID は `wrangler r2 bucket create` / `kv namespace create` / `d1 create` で発行して埋める。
# ─────────────────────────────────────────────────────────────

[[r2_buckets]]
binding = "NAR_BUCKET"
bucket_name = "cf-edgenix-nar"

[[kv_namespaces]]
binding = "META_KV"
id = "396c7db249e04c2c819d4c25d2b47cd4"

[[d1_databases]]
binding = "CONTROL_DB"
database_name = "cf-edgenix-control"
database_id = "ed98598e-2cfc-443d-9c62-a6bff0e3235e"
migrations_dir = "migrations"

[vars]
# nix-cache-info の Priority。小さいほど優先（公式 cache.nixos.org は 40）。
CACHE_INFO_PRIORITY = "30"
# quota kill-switch 用。deploy 前に実 Cloudflare Account ID に置換すること。
CF_ACCOUNT_ID = "8aa8b75c4cc3e97fdcef331a87539b11"
QUOTA_R2_BUCKET_NAME = "cf-edgenix-nar"

[triggers]
crons = ["*/5 * * * *"]

# Workers Logs を有効化（dashboard の Logs タブ / wrangler tail で確認可能）。
# invocation_logs = true で 1 リクエスト 1 行のサマリログも残す。
[observability.logs]
enabled = true
invocation_logs = true

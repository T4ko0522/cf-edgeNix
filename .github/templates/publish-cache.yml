# cf-edgeNix へ NixOS closure を publish する GitHub Actions workflow テンプレート。
#
# 配置先: <あなたの NixOS flake repo>/.github/workflows/publish-cache.yml
#
# このテンプレートは cf-edgeNix の scripts/publish.sh を再利用するため、
# 呼び出し側 repo に cf-edgeNix を別 path で checkout してから走らせる。
#
# ── 事前準備（呼び出し側 repo の Settings で登録する） ───────────────────────
#   Environments → production を作成し、以下を登録:
#     Secrets:
#       CACHE_PRIVATE_KEY     NAR 署名用秘密鍵（fork PR 露出防止のため必ず environment に置く）
#       ADMIN_TOKEN           cf-edgeNix Worker の write API Bearer
#       CLOUDFLARE_API_TOKEN  R2 write + KV write の最小権限トークン（deploy 用とは分離推奨）
#     Variables:
#       CLOUDFLARE_ACCOUNT_ID
#       API_BASE_URL          deploy 済み cf-edgeNix Worker の URL
#       R2_BUCKET_NAME        例: cf-edgenix-nar
#       KV_NAMESPACE_ID
#
# ── 設置後に書き換える箇所 ──────────────────────────────────────────────
#   1. matrix.host を実 nixosConfigurations 名の配列に置き換える
#   2. cf-edgeNix の ref を pin したい場合は actions/checkout の ref を tag/SHA に変更
#
# ── 動作概要 ────────────────────────────────────────────────────────
#   - 呼び出し側 repo (flake source) を CWD に、cf-edgeNix を .cf-edgenix/ に checkout
#   - .cf-edgenix で bun install して publish tooling を準備
#   - host 毎に matrix で並列実行（content-addressed なので衝突しない）
#   - bash .cf-edgenix/scripts/publish.sh が
#       nix build .#nixosConfigurations.<HOST>...
#       nix copy --to file://$CACHE_DIR (署名)
#       bun publish.ts → R2 / D1 / KV へ反映
#     を順に実行する

name: publish-cache

on:
  workflow_dispatch:
    inputs:
      host:
        description: "対象 host を 1 つだけ指定したい場合（空なら matrix の全 host）"
        required: false
        type: string
  push:
    branches: [main]

concurrency:
  group: publish-cache-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        host: [host1, host2]  # ←ここを実 nixosConfigurations 名に書き換える

    steps:
      - name: Checkout flake source (this repo)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout cf-edgeNix (publish tooling)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: T4ko0522/cf-edgeNix
          ref: main
          path: .cf-edgenix

      - name: Skip host if input given and not matched
        id: gate
        env:
          REQUESTED: ${{ inputs.host }}
          CURRENT: ${{ matrix.host }}
        run: |
          if [ -n "$REQUESTED" ] && [ "$REQUESTED" != "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Nix
        if: steps.gate.outputs.skip == 'false'
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Bun
        if: steps.gate.outputs.skip == 'false'
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.14"

      - name: Install cf-edgeNix deps
        if: steps.gate.outputs.skip == 'false'
        working-directory: .cf-edgenix
        run: bun install

      # CWD は flake source のまま、scripts は .cf-edgenix/scripts/ から起動する。
      # publish.sh は CWD の flake に対して nix build を走らせるので、
      # 呼び出し側 repo の nixosConfigurations.<HOST> がビルドされる。
      # closure.json は CWD に書き出され publish.ts が CWD から読む（整合）。
      - name: Build, sign & publish
        if: steps.gate.outputs.skip == 'false'
        env:
          HOST: ${{ matrix.host }}
          CACHE_DIR: ${{ runner.temp }}/cache-${{ matrix.host }}
          CACHE_PRIVATE_KEY: ${{ secrets.CACHE_PRIVATE_KEY }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          KV_NAMESPACE_ID: ${{ vars.KV_NAMESPACE_ID }}
          GIT_REV: ${{ github.sha }}
          SYSTEM: x86_64-linux
          FLAKE_LOCK_HASH: ${{ hashFiles('flake.lock') }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p "$CACHE_DIR"
          bash .cf-edgenix/scripts/publish.sh

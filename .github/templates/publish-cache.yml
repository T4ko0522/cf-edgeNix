# cf-edgeNix へ NixOS closure を publish する GitHub Actions workflow テンプレート。
#
# 配置先: <あなたの NixOS flake repo>/.github/workflows/publish-cache.yml
#
# このテンプレートは cf-edgeNix の scripts/publish.sh を再利用するため、
# 呼び出し側 repo に cf-edgeNix を別 path で checkout してから走らせる。
#
# ── 事前準備（呼び出し側 repo の Settings で登録する） ───────────────────────
#   Environments → production を作成し、以下を登録:
#     Secrets:
#       CACHE_PRIVATE_KEY     NAR 署名用秘密鍵（fork PR 露出防止のため必ず environment に置く）
#       ADMIN_TOKEN           cf-edgeNix Worker の write API Bearer
#       CLOUDFLARE_API_TOKEN  KV bulk write の最小権限トークン（deploy 用とは分離推奨）
#       R2_ACCESS_KEY_ID      R2 S3 API のアクセスキー（R2 dashboard → Manage R2 API tokens）
#       R2_SECRET_ACCESS_KEY  R2 S3 API のシークレットキー
#     Variables:
#       CLOUDFLARE_ACCOUNT_ID
#       API_BASE_URL          deploy 済み cf-edgeNix Worker の URL
#       R2_BUCKET_NAME        例: cf-edgenix-nar
#       KV_NAMESPACE_ID
#
# ── 設置後に書き換える箇所 ──────────────────────────────────────────────
#   1. Resolve target hosts ステップの allowlist (host1|host2) と default list を
#      実 nixosConfigurations 名に置き換える
#   2. cf-edgeNix の checkout ref を最新の commit SHA に pin する
#      （branch tip 追従だと上流 commit が即座に secret を持った状態で実行されてしまう）
#   3. push.branches を実 default branch に合わせる（main / master 等）
#
# ── 動作概要 ────────────────────────────────────────────────────────
#   - 呼び出し側 repo (flake source) を CWD に、cf-edgeNix を .cf-edgenix/ に checkout
#   - /nix/store と bun install を cache し再ラン時のビルドを短縮
#   - host を 1 つの job 内で直列に publish（content-addressed なので衝突せず、
#     かつ /nix/store の共通依存が host 間で自然に再利用される）
#   - bash .cf-edgenix/scripts/publish.sh が
#       nix build .#nixosConfigurations.<HOST>...
#       nix copy --to file://$CACHE_DIR (署名)
#       bash scripts/prune-upstream.sh (cache.nixos.org にある path を除外)
#       bun publish.ts → R2 (S3 API) / KV bulk へ反映
#     を順に実行する
#   - 1 host が失敗しても残りを試行し、最後に集約して exit する
#   - SKIP_UPSTREAM_PRUNE=1 / UPSTREAM_CACHE_URL=... で prune 挙動を制御可能 (docs/publish.md)

name: publish-cache

on:
  workflow_dispatch:
    inputs:
      host:
        description: "対象 host を 1 つだけ指定したい場合（空なら全 host）"
        required: false
        type: string
  push:
    branches: [main]

concurrency:
  group: publish-cache-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: production

    steps:
      - name: Checkout flake source (this repo)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # secret を扱う job なので cf-edgeNix も SHA pin する。
      # branch tip 追従だと上流 commit が即座に CACHE_PRIVATE_KEY / ADMIN_TOKEN /
      # CLOUDFLARE_API_TOKEN / R2_* を持った状態で実行されてしまうため、
      # 更新は呼び出し側 repo で意図的に SHA を bump する PR で行う。
      - name: Checkout cf-edgeNix (publish tooling)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: T4ko0522/cf-edgeNix
          ref: REPLACE_WITH_CF_EDGENIX_COMMIT_SHA # 最新の main commit SHA に書き換える
          path: .cf-edgenix

      # workflow_dispatch.inputs.host が空なら全 host、指定があれば allowlist 内のもののみ。
      # allowlist と default list を実 nixosConfigurations 名に書き換える。
      - name: Resolve target hosts
        id: hosts
        env:
          REQUESTED: ${{ inputs.host }}
        run: |
          if [ -z "$REQUESTED" ]; then
            echo "list=host1 host2" >> "$GITHUB_OUTPUT"
          else
            case "$REQUESTED" in
              host1|host2)
                echo "list=$REQUESTED" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "unknown host: $REQUESTED" >&2
                exit 1
                ;;
            esac
          fi

      # flake.nix の nixConfig.extra-substituters は trusted-user 制約で runner では効かないため、
      # ここで明示的に substituter / trusted-public-keys を inject する。
      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://cache.numtide.com
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=
            accept-flake-config = true

      # /nix/store を全 host 共通でキャッシュ。1 job 内で host を直列に build するので
      # 共通依存は同一ランで自然に共有され、次回ラン以降は cache から復元される。
      - name: Cache /nix/store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('.cf-edgenix/bun.lock', '.cf-edgenix/bun.lockb', '.cf-edgenix/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install cf-edgeNix deps
        working-directory: .cf-edgenix
        run: bun install --frozen-lockfile

      # CWD は flake source のまま、scripts は .cf-edgenix/scripts/ から起動する。
      # publish.sh は CWD の flake に対して nix build を走らせるので、
      # 呼び出し側 repo の nixosConfigurations.<HOST> がビルドされる。
      # closure.json は CWD に書き出され publish.ts が CWD から読む（整合）。
      #
      # 各 host を順次 publish。publish.sh は 1 host 単位の API なので loop で回す。
      # 1 host 目で /nix/store に乗った共通依存は 2 host 目でそのまま再利用される。
      # 1 host が失敗しても残りを試行し、最後に集約して exit する。
      - name: Build, sign & publish (each host)
        env:
          HOSTS: ${{ steps.hosts.outputs.list }}
          CACHE_PRIVATE_KEY: ${{ secrets.CACHE_PRIVATE_KEY }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          KV_NAMESPACE_ID: ${{ vars.KV_NAMESPACE_ID }}
          GIT_REV: ${{ github.sha }}
          SYSTEM: x86_64-linux
          FLAKE_LOCK_HASH: ${{ hashFiles('flake.lock') }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          failed=()
          for host in $HOSTS; do
            echo "::group::publish $host"
            export HOST="$host"
            export CACHE_DIR="${RUNNER_TEMP}/cache-${host}"
            mkdir -p "$CACHE_DIR"
            if ! bash .cf-edgenix/scripts/publish.sh; then
              failed+=("$host")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            echo "failed hosts: ${failed[*]}" >&2
            exit 1
          fi

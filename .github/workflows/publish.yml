name: build-and-publish

# GitHub Actions = signed builder（spec §3 / §9）。
# NAR 署名鍵は secret / protected environment に置き、fork PR では露出させない（§9.1）。
on:
  workflow_dispatch:
    inputs:
      host:
        description: "対象 nixosConfiguration 名"
        required: true
        type: string
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # 署名鍵を持つ protected environment（fork PR から触れない）
    environment: production
    steps:
      # 修正16: SHA ピン（タグは移動可能なためコミット SHA で固定）
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      # nix build + nix copy（Phase 1）と R2/D1/KV 反映（Phase 2）を
      # publish.sh 1 ステップで統合実行（二重実行を排除・G4）。
      # CACHE_PRIVATE_KEY は publish.sh 内で一時ファイルに書き出し argv 非露出（G9）。
      # env: 経由で渡して run: への直接展開を避ける（injection 回避）。
      - name: Build, sign & publish to R2/D1/KV
        env:
          HOST: ${{ inputs.host || 'myhost' }}
          CACHE_DIR: ${{ runner.temp }}/cache
          CACHE_PRIVATE_KEY: ${{ secrets.CACHE_PRIVATE_KEY }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          KV_NAMESPACE_ID: ${{ vars.KV_NAMESPACE_ID }}
          GIT_REV: ${{ github.sha }}
          SYSTEM: x86_64-linux
          FLAKE_LOCK_HASH: ${{ hashFiles('flake.lock') }}
          # CF token は R2 write / KV write を最小権限で分離（§9.1）
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p "$CACHE_DIR"
          bash scripts/publish.sh

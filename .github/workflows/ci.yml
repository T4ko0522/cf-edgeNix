name: ci

# CI ゲート: unit + integration 両 project を Ubuntu で実行する。
# NixOS では integration は steam-run 経由が必要だが、
# Ubuntu（GitHub Actions runner）では steam-run 不要で直接 vitest を実行できる。
#
# ローカル NixOS 環境では以下のコマンドを使うこと:
#   unit:        npx vitest run --project unit
#   integration: steam-run npx vitest run --project integration

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # SHA ピン（publish.yml に合わせる）
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests (unit + integration)
        # Ubuntu では steam-run 不要。vitest run がデフォルトで両 project を実行する。
        run: npx vitest run

      - name: Wrangler dry-run deploy
        run: npx wrangler deploy --dry-run
        env:
          CLOUDFLARE_ACCOUNT_ID: "dummy-for-dry-run"
          CLOUDFLARE_API_TOKEN: "dummy-for-dry-run"
